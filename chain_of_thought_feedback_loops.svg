  <title
     id="title1">Chain-of-thought as two nested feedback loops</title>
  <desc
     id="desc1">An algorithmic chain-of-thought loop (parse, plan, solve, verify, revise) wrapped in a human-machine loop where the person assesses the answer and refines the prompt.</desc>
