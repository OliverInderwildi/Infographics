<text class="co" style="fill:#A57C5B" x="112" y="314">Anthropic Claude</text>
<text class="mdl" style="fill:#A57C5B" x="299" y="314" text-anchor="middle">Haiku</text>
<text class="mdl" style="fill:#A57C5B" x="410" y="314" text-anchor="middle">web search</text>
<text class="mdl" style="fill:#A57C5B" x="559" y="314" text-anchor="middle">Opus ext.</text>
<line x1="326" y1="311" x2="378" y2="311" stroke="#A57C5B" stroke-width="1.3" marker-end="url(#fm)"/>
