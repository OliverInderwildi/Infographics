<text class="node" x="545" y="130" text-anchor="end">Chain-of-thought</text>
<text class="nsub" x="573" y="130">~25 Wh</text>

<text class="co" style="fill:#5A2C72" x="112" y="282">Google Gemini</text>
<text class="mdl" style="fill:#5A2C72" x="299" y="282" text-anchor="middle">Flash-Lite</text>
