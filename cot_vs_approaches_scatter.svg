<svg xmlns="http://www.w3.org/2000/svg" width="680" height="452" viewBox="0 0 680 452" role="img">
<title>Capability vs energy efficiency across chain-of-thought and other approaches</title>
<desc>Standard chatbots at direct answer (~0.3 Wh), Perplexity at retrieval (~2 Wh), DeepSeek-R1 at chain-of-thought (~25 Wh). Google Gemini, OpenAI ChatGPT, Anthropic Claude and xAI Grok each span all three modes. Elo is a proxy for capability; energy per query scales with emissions.</desc>
<defs>
<style>
.axt{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:500;font-size:12px;fill:#1F2E51;}
.tick{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:400;font-size:11px;fill:#505050;}
.node{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:700;font-size:15px;fill:#1F2E51;}
.nsub{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:400;font-size:11px;fill:#767068;}
.mdl{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:500;font-size:11.5px;}
.co{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:700;font-size:12px;}
.spec{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:700;font-size:12px;}
.fn{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:400;font-size:11px;fill:#767068;}
</style>
<marker id="fm" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect x="0" y="0" width="680" height="452" fill="#FFFFFF"/>

<rect x="100" y="266" width="540" height="76" fill="#F7F6F3"/>

<line x1="235" y1="62" x2="235" y2="380" stroke="#EEEEEE" stroke-width="1"/>
<line x1="370" y1="62" x2="370" y2="380" stroke="#EEEEEE" stroke-width="1"/>
<line x1="505" y1="62" x2="505" y2="380" stroke="#EEEEEE" stroke-width="1"/>
<line x1="640" y1="62" x2="640" y2="380" stroke="#A0A0A0" stroke-width="1" stroke-dasharray="3 3"/>
<line x1="100" y1="322" x2="640" y2="322" stroke="#EEEEEE" stroke-width="1"/>
<line x1="100" y1="264" x2="640" y2="264" stroke="#EEEEEE" stroke-width="1"/>
