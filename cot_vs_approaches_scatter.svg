<text class="axt" transform="translate(44,224) rotate(-90)" text-anchor="middle">Capability [Elo<tspan dy="-5" font-size="10">proxy</tspan><tspan dy="5">]</tspan></text>
<line x1="100" y1="380" x2="100" y2="60" stroke="#505050" stroke-width="1.2"/>
<line x1="100" y1="380" x2="642" y2="380" stroke="#505050" stroke-width="1.2"/>
<text class="axt" x="372" y="410" text-anchor="middle">Energy efficiency [Wh/query]</text>
