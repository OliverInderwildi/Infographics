<text class="co" style="fill:#0B341C" x="112" y="330">xAI Grok</text>
<text class="mdl" style="fill:#0B341C" x="299" y="330" text-anchor="middle">Grok</text>
<text class="mdl" style="fill:#0B341C" x="410" y="330" text-anchor="middle">DeepSearch</text>
<text class="mdl" style="fill:#0B341C" x="559" y="330" text-anchor="middle">Think</text>
<line x1="322" y1="327" x2="373" y2="327" stroke="#0B341C" stroke-width="1.3" marker-end="url(#fm)"/>
<line x1="448" y1="327" x2="533" y2="327" stroke="#0B341C" stroke-width="1.3" marker-end="url(#fm)"/>

<text class="fn" x="100" y="428">Elo = capability proxy · energy/query ∝ emissions · positions illustrative.</text>
<text class="fn" x="100" y="442">Perplexity (research) and DeepSeek-R1 (reasoning) are mode specialists.</text>
</svg>
